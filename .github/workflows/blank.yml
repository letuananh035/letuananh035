name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # Runs at 03:00 UTC every day
  push:
    branches: [ "master" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the SVG files back to the repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Generate General Stats Card
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Generate Top Languages Card
      # This will highlight your expertise in Kotlin, Java, etc.
      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: languages
          options: username=${{ github.repository_owner }}&layout=compact&theme=radical
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Commit and Push all generated cards
      - name: Commit and Push cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          git commit -m "Update README cards: stats and languages" || exit 0
          git push origin master
