name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to push the generated SVG back to your repo
    steps:
      - uses: actions/checkout@v4

      - name: GitHub Readme Stats Action
        uses: stats-organization/github-readme-stats-action@v1.1.0
        with:
          card: "stats"
          token: ${{ secrets.GITHUB_TOKEN }}
          path: "github-readme-stats.svg" # This forces it to the root
