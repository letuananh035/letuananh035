name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 03:00 UTC
  push:
    branches: [ "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for pushing the generated SVG files back to the repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all branches and tags

      # Step 1: Generate General Stats Card (Includes Private Contributions)
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # Added count_private=true to include your private work history
          # Using theme=radical and showing icons for a modern look
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Generate Top Languages Card (Includes Private Repos)
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # Default layout (non-compact) works better for vertical stacking
          # count_private=true ensures languages from your private Android/Game projects are counted
          options: username=${{ github.repository_owner }}&theme=radical&count_private=true
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Commit and Push all generated cards to the master branch
      - name: Commit and Push cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          git commit -m "Update README cards: inclusive of private repos & vertical layout" || exit 0
          git push origin master
