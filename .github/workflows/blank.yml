name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 03:00 UTC
  push:
    branches: [ "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing the generated SVG files back to the repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 1: Generate General Stats Card
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # Keeps theme radical and shows icons. Default height is ~195px.
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Generate Top Languages Card (FIXED SIZE)
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # FIX: Added '&height=195' to match the General Stats card height.
          options: username=${{ github.repository_owner }}&layout=compact&theme=radical&height=195
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Commit and Push all generated cards
      - name: Commit and Push cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          git commit -m "Update README cards: fixed sizes and radical theme" || exit 0
          # Since your main branch is master
          git push origin master
